<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeane — Sua assistente pedagógica</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"><\/script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #2D6A4F; --verde-mid: #40916C; --verde-claro: #B7E4C7;
      --creme: #F8F4EE; --texto: #1A1A1A; --texto-soft: #5C5C5C;
      --borda: #E0DAD2; --branco: #FFFFFF; --radius: 14px;
    }
    body { font-family: "Inter", sans-serif; background: var(--creme); color: var(--texto); min-height: 100vh; }
    header { background: var(--branco); border-bottom: 1px solid var(--borda); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { font-family: "Fraunces", serif; font-size: 22px; font-weight: 600; color: var(--verde); letter-spacing: -0.5px; }
    .logo span { font-weight: 300; font-style: italic; color: var(--texto-soft); font-size: 13px; margin-left: 8px; }
    .badge-beta { background: var(--verde-claro); color: var(--verde); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 48px 24px; display: grid; grid-template-columns: 300px 1fr; gap: 32px; align-items: start; }
    .jeane-card { background: var(--branco); border: 1px solid var(--borda); border-radius: var(--radius); overflow: hidden; position: sticky; top: 88px; }
    .jeane-foto { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; }
    .jeane-info { padding: 20px; }
    .jeane-nome { font-family: "Fraunces", serif; font-size: 24px; font-weight: 600; color: var(--verde); margin-bottom: 4px; }
    .jeane-titulo { font-size: 13px; color: var(--texto-soft); line-height: 1.5; margin-bottom: 16px; }
    .jeane-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--creme); border: 1px solid var(--borda); color: var(--texto-soft); font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
    .painel { display: flex; flex-direction: column; gap: 24px; }
    .formulario { background: var(--branco); border: 1px solid var(--borda); border-radius: var(--radius); padding: 32px; }
    .formulario h2 { font-family: "Fraunces", serif; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .formulario p { font-size: 14px; color: var(--texto-soft); margin-bottom: 24px; line-height: 1.6; }
    .campo-grupo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; }
    textarea, select { font-family: "Inter", sans-serif; font-size: 14px; color: var(--texto); background: var(--creme); border: 1px solid var(--borda); border-radius: 10px; padding: 12px 16px; width: 100%; outline: none; transition: border-color 0.2s; resize: none; }
    textarea { height: 100px; }
    textarea:focus, select:focus { border-color: var(--verde-mid); }
    .btn-gerar { width: 100%; background: var(--verde); color: var(--branco); border: none; border-radius: 10px; padding: 14px; font-family: "Inter", sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
    .btn-gerar:hover { background: var(--verde-mid); }
    .btn-gerar:disabled { background: #aaa; cursor: not-allowed; }
    .resultado { background: var(--branco); border: 1px solid var(--borda); border-radius: var(--radius); padding: 32px; }
    .resultado-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--borda); }
    .resultado-header h3 { font-family: "Fraunces", serif; font-size: 18px; font-weight: 600; color: var(--verde); }
    .btn-pdf { background: var(--creme); border: 1px solid var(--borda); color: var(--verde); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: "Inter", sans-serif; transition: background 0.2s; }
    .btn-pdf:hover { background: var(--verde-claro); }
    .resultado-conteudo { font-size: 14px; line-height: 1.8; }
    .resultado-conteudo h2 { font-family: "Fraunces", serif; font-size: 17px; font-weight: 600; color: var(--verde); margin: 20px 0 8px; }
    .resultado-conteudo h2:first-child { margin-top: 0; }
    .resultado-conteudo ul, .resultado-conteudo ol { padding-left: 20px; margin: 8px 0; }
    .resultado-conteudo li { margin-bottom: 4px; }
    .resultado-conteudo p { margin-bottom: 8px; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 48px; text-align: center; }
    .loading-dots { display: flex; gap: 8px; }
    .dot { width: 10px; height: 10px; background: var(--verde-mid); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-10px); opacity: 1; } }
    .loading p { font-size: 14px; color: var(--texto-soft); }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } header { padding: 0 20px; } }
    @media print { header, .jeane-card, .formulario, .btn-pdf { display: none !important; } .container { grid-template-columns: 1fr; padding: 0; } .resultado { border: none; padding: 0; } }
  </style>
</head>

<script>
  async function gerarAtividade() {
    const pedido = document.getElementById("pedido").value.trim();
    const faixa = document.getElementById("faixa").value;
    if (!pedido) { alert("Descreva o que você quer trabalhar com a turma."); return; }
    const btn = document.querySelector(".btn-gerar");
    btn.disabled = true; btn.textContent = "Gerando…";
    document.getElementById("loading-box").style.display = "block";
    document.getElementById("resultado-box").style.display = "none";
    try {
      const res = await fetch("https://jeane-one.vercel.app/gerar-atividade", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pedido, faixa_etaria: faixa })
      });
      const data = await res.json();
      document.getElementById("loading-box").style.display = "none";
      document.getElementById("resultado-box").style.display = "block";
      document.getElementById("resultado-conteudo").innerHTML = marked.parse(data.atividade);
    } catch(e) {
      document.getElementById("loading-box").style.display = "none";
      alert("Erro ao gerar atividade. Tente novamente.");
    }
    btn.disabled = false; btn.textContent = "✦ Gerar atividade com Jeane";
  }
<\/script>
