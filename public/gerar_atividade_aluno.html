<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeane — Atividade para o Aluno</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --verde: #2D6A4F; --verde-mid: #40916C; --creme: #F8F4EE;
  --borda: #E0DAD2; --texto: #1A1A1A; --texto-soft: #5C5C5C; --branco: #FFFFFF;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--creme); color: var(--texto); min-height: 100vh; }

/* FORMULÁRIO */
.tela-form { max-width: 680px; margin: 0 auto; padding: 40px 24px; }
.form-header { margin-bottom: 32px; }
.form-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--verde); margin-bottom: 6px; }
.form-header p { color: var(--texto-soft); font-size: 0.9rem; }
.card { background: var(--branco); border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--borda); }
.card-titulo { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--verde); margin-bottom: 16px; }
.campo { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.campo label { font-size: 0.85rem; font-weight: 600; color: #444; }
.campo input, .campo select, .campo textarea {
  padding: 10px 12px; border: 1.5px solid var(--borda); border-radius: 8px;
  font-size: 0.9rem; font-family: inherit; background: var(--creme); color: var(--texto); transition: border-color 0.2s;
}
.campo input:focus, .campo select:focus, .campo textarea:focus { outline: none; border-color: var(--verde); background: var(--branco); }
.campo textarea { resize: vertical; min-height: 80px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.qtd-selector { display: flex; gap: 8px; margin-top: 4px; }
.qtd-btn { width: 44px; height: 44px; border: 2px solid var(--borda); border-radius: 10px; background: var(--creme); font-size: 1rem; font-weight: 700; color: #666; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.qtd-btn:hover { border-color: var(--verde-mid); color: var(--verde); }
.qtd-btn.ativo { border-color: var(--verde); background: var(--verde); color: white; }
.toggle-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid var(--borda); }
.toggle-row:first-child { border-top: none; padding-top: 0; }
.toggle-label { font-size: 0.85rem; color: #444; }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #CCC; border-radius: 22px; cursor: pointer; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--verde); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
.btn-gerar { width: 100%; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn-gerar:hover { background: var(--verde-mid); }
.btn-gerar:disabled { background: #9CC5B2; cursor: not-allowed; }
.status-msg { text-align: center; padding: 14px; color: var(--verde); font-size: 0.9rem; display: none; }
.debug-panel { background: #1a1a2e; color: #00ff88; font-family: monospace; font-size: 0.72rem; padding: 16px; border-radius: 10px; margin: 12px 0; max-height: 280px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; display: none; }
.debug-toggle { font-size: 0.75rem; color: var(--texto-soft); cursor: pointer; text-decoration: underline; text-align: center; display: block; margin-top: 8px; }

/* FOLHA */
#tela-folha { display: none; }
.folha-wrapper { max-width: 800px; margin: 0 auto; padding: 24px; }
.acoes { display: flex; gap: 12px; margin-bottom: 20px; }
.btn-acao { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-voltar { background: var(--borda); color: #444; }
.btn-voltar:hover { background: #ccc; }
.btn-imprimir { background: var(--verde); color: white; }
.btn-imprimir:hover { background: var(--verde-mid); }

.folha {
  background: white;
  border-left: 8px solid transparent;
  border-image: linear-gradient(to bottom,#E53935 0%,#E53935 10%,#F9A825 10%,#F9A825 20%,#43A047 20%,#43A047 30%,#1E88E5 30%,#1E88E5 40%,#8E24AA 40%,#8E24AA 50%,#E53935 50%,#E53935 60%,#F9A825 60%,#F9A825 70%,#43A047 70%,#43A047 80%,#1E88E5 80%,#1E88E5 90%,#8E24AA 90%,#8E24AA 100%) 1;
  border-right: 8px solid transparent; border-image-slice: 1;
  padding: 28px 32px 28px 28px;
}
.folha-cabecalho { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; margin-bottom: 16px; border-bottom: 3px solid var(--verde); }
.cab-escola { display: flex; flex-direction: column; gap: 2px; }
.cab-escola-nome { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.cab-escola-sub { font-size: 0.72rem; color: var(--texto-soft); }
.cab-badge { background: var(--verde); color: white; font-size: 0.85rem; font-weight: 700; padding: 7px 18px; border-radius: 20px; }
.campos-aluno { display: grid; grid-template-columns: 2fr 1fr; gap: 8px 20px; margin-bottom: 20px; }
.campo-aluno { display: flex; flex-direction: column; gap: 3px; }
.campo-aluno-label { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #AAA; }
.campo-aluno-linha { border-bottom: 1.5px solid #333; height: 22px; }
.atividade-titulo-box { background: #F0FAF4; border: 2px solid var(--verde); border-radius: 10px; padding: 10px 20px; text-align: center; margin-bottom: 22px; }
.atividade-titulo { font-size: 1.05rem; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: 0.05em; }
.exercicio { margin-bottom: 20px; page-break-inside: avoid; }
.exercicio-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.exercicio-num { background: var(--verde); color: white; min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.82rem; font-weight: 700; flex-shrink: 0; }
.exercicio-enunciado { font-size: 0.92rem; font-weight: 600; color: var(--texto); line-height: 1.45; padding-top: 3px; }
.linha-escrita { border-bottom: 1.5px solid #999; height: 36px; margin-bottom: 6px; }
.linha-pontilhada { border-bottom: 1.5px dashed #999; height: 36px; margin-bottom: 6px; }
.caixa-resposta { border: 1.5px solid #CCC; border-radius: 10px; min-height: 70px; margin-top: 8px; }
.caixa-desenho { border: 1.5px solid #CCC; border-radius: 10px; min-height: 110px; display: flex; align-items: center; justify-content: center; color: #DDD; font-size: 0.75rem; margin-top: 8px; }
.opcoes-circule { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.opcao-item { border: 2px solid #CCC; border-radius: 10px; padding: 8px 20px; font-size: 0.9rem; min-width: 60px; text-align: center; font-weight: 500; }
.item-completar { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.item-completar-texto { font-size: 0.9rem; min-width: 140px; font-weight: 500; }
.item-completar-linha { flex: 1; border-bottom: 1.5px solid #999; height: 28px; }
.separador { border: none; border-top: 1px dashed #E0DDD8; margin: 4px 0 16px; }
.secao-desenho-livre { margin-top: 22px; padding-top: 16px; border-top: 1.5px dashed #C8E6C9; }
.secao-desenho-titulo { font-size: 0.78rem; font-weight: 700; color: var(--verde); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.caixa-desenho-livre { border: 1.5px solid #CCC; border-radius: 10px; min-height: 130px; display: flex; align-items: center; justify-content: center; color: #DDD; font-size: 0.75rem; }
.folha-rodape { margin-top: 22px; padding-top: 10px; border-top: 1px solid var(--borda); display: flex; justify-content: space-between; font-size: 0.68rem; color: #CCC; }

/* TRACEJADO */
.tracejado-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; align-items: center; }
.tracejado-char { display: flex; flex-direction: column; align-items: center; }
.tracejado-svg { width: 70px; height: 80px; }

/* FIGURAS */
.figuras-container { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; align-items: flex-end; }
.figura-item { display: flex; flex-direction: column; align-items: center; }
.figura-svg { width: 72px; height: 72px; }

/* CONTAGEM */
.contagem-container { margin-top: 10px; display: flex; flex-direction: column; gap: 16px; }
.contagem-grupo { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.contagem-figuras { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.contagem-figura { width: 40px; height: 40px; }
.contagem-resposta-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.contagem-resposta { border-bottom: 2px solid #555; width: 48px; height: 32px; }
.contagem-resposta-label { font-size: 0.6rem; color: #AAA; text-transform: uppercase; }

/* CAÇA-PALAVRAS */
.cacapalavras-wrap { margin-top: 10px; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
.cacapalavras-grade { display: inline-block; }
.grade-row { display: flex; }
.grade-cel {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid #CCC;
  font-size: 1.05rem; font-weight: 700;
  font-family: 'Courier New', monospace;
  color: #222;
}
.cacapalavras-lista { flex: 1; min-width: 120px; }
.cacapalavras-lista-titulo { font-size: 0.72rem; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.cacapalavras-lista ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.cacapalavras-lista li { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.cacapalavras-lista li::before { content: '☐'; font-size: 1rem; color: #CCC; }

@media print {
  body { background: white; }
  .tela-form, .acoes, .debug-panel, .debug-toggle { display: none !important; }
  #tela-folha { display: block !important; }
  .folha-wrapper { padding: 0; max-width: 100%; }
  @page { margin: 8mm; }
}
</style>
</head>
<body>

<div class="tela-form" id="tela-form">
  <div class="form-header">
    <h1>Criar Atividade para o Aluno</h1>
    <p>Educação Infantil — folha pronta para imprimir</p>
  </div>
  <div class="card">
    <div class="card-titulo">Sobre a Atividade</div>
    <div class="campo">
      <label>O que você quer trabalhar com os alunos?</label>
      <textarea id="pedido" placeholder="Ex: Caça-palavras com animais, números pontilhados de 1 a 5, identificar cores..."></textarea>
    </div>
    <div class="grid-2">
      <div class="campo">
        <label>Turma</label>
        <select id="turma">
          <option value="">Selecione...</option>
          <option value="Berçário">Berçário (0-1 ano)</option>
          <option value="G1">G1 (1-2 anos)</option>
          <option value="G2">G2 (2-3 anos)</option>
          <option value="G3">G3 (3-4 anos)</option>
          <option value="G4">G4 — Etapa 1 (4 anos)</option>
          <option value="G5">G5 — Etapa 2 (5 anos)</option>
        </select>
      </div>
      <div class="campo">
        <label>Tema do Mês (opcional)</label>
        <input type="text" id="tema" placeholder="Ex: Família, Natureza...">
      </div>
    </div>
    <div class="campo">
      <label>Nome da Escola (opcional)</label>
      <input type="text" id="escola" placeholder="Ex: EMEI Girassol">
    </div>
  </div>
  <div class="card">
    <div class="card-titulo">Quantidade de Exercícios</div>
    <div class="campo" style="margin-bottom:0">
      <label style="margin-bottom:8px">Quantos exercícios?</label>
      <div class="qtd-selector">
        <button class="qtd-btn" onclick="setQtd(2)">2</button>
        <button class="qtd-btn" onclick="setQtd(3)">3</button>
        <button class="qtd-btn ativo" onclick="setQtd(4)">4</button>
        <button class="qtd-btn" onclick="setQtd(5)">5</button>
        <button class="qtd-btn" onclick="setQtd(6)">6</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-titulo">Formato da Folha</div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="linhas-pontilhadas"><span class="toggle-slider"></span></label>
      <span class="toggle-label">Linhas pontilhadas para escrita</span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="espaco-desenho" checked><span class="toggle-slider"></span></label>
      <span class="toggle-label">Espaço para desenho livre ao final</span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="campo-nome" checked><span class="toggle-slider"></span></label>
      <span class="toggle-label">Cabeçalho com nome, data e turma</span>
    </div>
  </div>
  <button class="btn-gerar" id="btn-gerar" onclick="gerarAtividade()">Gerar Atividade</button>
  <div class="status-msg" id="status">✦ Criando a atividade, aguarde...</div>
  <span class="debug-toggle" onclick="toggleDebug()">ver JSON da última resposta</span>
  <div class="debug-panel" id="debug-panel"></div>
</div>

<div id="tela-folha">
  <div class="folha-wrapper">
    <div class="acoes">
      <button class="btn-acao btn-voltar" onclick="voltarForm()">← Criar outra</button>
      <button class="btn-acao btn-imprimir" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>
    <div class="folha" id="folha-conteudo"></div>
  </div>
</div>

<script>
const API = "https://jeane-one.vercel.app";
let qtdSelecionada = 4;
let ultimoJSON = null;

function setQtd(n) {
  qtdSelecionada = n;
  document.querySelectorAll('.qtd-btn').forEach(b => b.classList.toggle('ativo', parseInt(b.textContent) === n));
}
function toggleDebug() {
  const p = document.getElementById('debug-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
  p.textContent = ultimoJSON ? JSON.stringify(ultimoJSON, null, 2) : '(nenhuma resposta ainda)';
}

  'Y':'M10 10 L30 40 L50 10 M30 40 L30 72','Z':'M12 10 L48 10 L12 72 L48 72',
};

function gerarSVGTracejado(char) {
  const c = String(char).trim().toUpperCase();
  const path = /\d/.test(c) ? PATHS_DIGITOS[c] : PATHS_LETRAS[c];
  if (!path) return `<svg class="tracejado-svg" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><text x="8" y="60" font-size="52" fill="#CCC" font-family="monospace">${c}</text></svg>`;
  const m = path.match(/M\s*([\d.]+)\s+([\d.]+)/);
  const ponto = m ? `<circle cx="${m[1]}" cy="${m[2]}" r="4" fill="#74C69D" opacity="0.9"/>` : '';
  return `<svg class="tracejado-svg" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
    <line x1="4" y1="74" x2="56" y2="74" stroke="#FFCCCC" stroke-width="1.5"/>
    <path d="${path}" fill="none" stroke="#CCCCCC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,5"/>
    ${ponto}</svg>`;
}

// ══════════════════════════════════════════════
// ALGORITMO CAÇA-PALAVRAS
// ══════════════════════════════════════════════
function gerarCacaPalavras(palavras) {
  // Tamanho mínimo para caber todas as palavras
  const maxLen = Math.max(...palavras.map(p => p.length));
  const tamanho = Math.max(maxLen + 2, Math.min(palavras.length * 2 + 1, 12));

  // Inicializa grade vazia
  const grade = Array.from({length: tamanho}, () => Array(tamanho).fill(''));

  const direcoes = [
    [0, 1],   // horizontal →
    [1, 0],   // vertical ↓
    [1, 1],   // diagonal ↘
  ];

  function tentarEncaixar(palavra, dir) {
    const [dr, dc] = dir;
    // Tenta 30 posições aleatórias
    for (let t = 0; t < 30; t++) {
      const linhaMax = tamanho - (dr > 0 ? palavra.length : 0);
      const colMax   = tamanho - (dc > 0 ? palavra.length : dc < 0 ? -(palavra.length-1) : 0);
      const colMin   = dc < 0 ? palavra.length - 1 : 0;

      if (linhaMax <= 0 || colMax <= colMin) continue;

      const linha = Math.floor(Math.random() * Math.max(1, linhaMax));
      const col   = colMin + Math.floor(Math.random() * Math.max(1, colMax - colMin));

      // Verifica se cabe sem conflito
      let ok = true;
      for (let i = 0; i < palavra.length; i++) {
        const r = linha + dr * i;
        const c = col  + dc * i;
        if (r < 0 || r >= tamanho || c < 0 || c >= tamanho) { ok = false; break; }
        if (grade[r][c] !== '' && grade[r][c] !== palavra[i]) { ok = false; break; }
      }
      if (ok) {
        for (let i = 0; i < palavra.length; i++) {
          grade[linha + dr * i][col + dc * i] = palavra[i];
        }
        return true;
      }
    }
    return false;
  }

  // Ordena palavras da maior para a menor (mais fácil encaixar)
  const ordenadas = [...palavras].sort((a, b) => b.length - a.length);

  for (const palavra of ordenadas) {
    let encaixou = false;
    // Tenta cada direção aleatoriamente
    const dirs = [...direcoes].sort(() => Math.random() - 0.5);
    for (const dir of dirs) {
      if (tentarEncaixar(palavra, dir)) { encaixou = true; break; }
    }
    if (!encaixou) {
      // Força horizontal se nada funcionou
      tentarEncaixar(palavra, [0, 1]);
    }
  }

  // Preenche espaços vazios com letras aleatórias
  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let r = 0; r < tamanho; r++)
    for (let c = 0; c < tamanho; c++)
      if (grade[r][c] === '') grade[r][c] = letras[Math.floor(Math.random() * letras.length)];

  return grade;
}

function renderCacaPalavras(palavras) {
  const grade = gerarCacaPalavras(palavras);
  const linhas = grade.map(row =>
    `<div class="grade-row">${row.map(cel => `<div class="grade-cel">${cel}</div>`).join('')}</div>`
  ).join('');

  const lista = palavras.map(p => `<li>${p}</li>`).join('');

  return `<div class="cacapalavras-wrap">
    <div class="cacapalavras-grade">${linhas}</div>
    <div class="cacapalavras-lista">
      <div class="cacapalavras-lista-titulo">Encontre as palavras:</div>
      <ul>${lista}</ul>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// GERAÇÃO E RENDER
// ══════════════════════════════════════════════
async function gerarAtividade() {
  const pedido = document.getElementById('pedido').value.trim();
  const turma  = document.getElementById('turma').value;
  if (!pedido || !turma) { alert('Preencha o que quer trabalhar e selecione a turma.'); return; }

  const btn = document.getElementById('btn-gerar');
  const status = document.getElementById('status');
  btn.disabled = true; status.style.display = 'block';

  try {
    const resp = await fetch(`${API}/gerar-atividade-aluno`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pedido, faixa_etaria: turma,
        linhas_pontilhadas: document.getElementById('linhas-pontilhadas').checked,
        espaco_desenho: document.getElementById('espaco-desenho').checked,
        tema: document.getElementById('tema').value.trim(),
        quantidade_exercicios: qtdSelecionada
      })
    });

    const data = await resp.json();
    ultimoJSON = data;
    const panel = document.getElementById('debug-panel');
    if (panel.style.display === 'block') panel.textContent = JSON.stringify(data, null, 2);
    if (data.erro || data.detail) throw new Error(data.erro || data.detail);

    renderFolha(data, {
      turma,
      linhasPontilhadas: document.getElementById('linhas-pontilhadas').checked,
      espacoDesenho: document.getElementById('espaco-desenho').checked,
      campoNome: document.getElementById('campo-nome').checked,
      escola: document.getElementById('escola').value.trim()
    });
  } catch(e) {
    alert('Erro: ' + e.message);
    btn.disabled = false; status.style.display = 'none';
  }
}

function renderFolha(data, opts) {
  const tipoLinha = opts.linhasPontilhadas ? 'linha-pontilhada' : 'linha-escrita';
  const hoje = new Date().toLocaleDateString('pt-BR');
  const nomeEscola = opts.escola || 'Educação Infantil';

  let cabHtml = '';
  if (opts.campoNome) {
    cabHtml = `
      <div class="folha-cabecalho">
        <div class="cab-escola"><span class="cab-escola-nome">${nomeEscola}</span><span class="cab-escola-sub">Educação Infantil</span></div>
        <div class="cab-badge">${opts.turma}</div>
      </div>
      <div class="campos-aluno">
        <div class="campo-aluno"><span class="campo-aluno-label">Nome do Aluno(a)</span><div class="campo-aluno-linha"></div></div>
        <div class="campo-aluno"><span class="campo-aluno-label">Data</span><div class="campo-aluno-linha"></div></div>
        <div class="campo-aluno"><span class="campo-aluno-label">Professora</span><div class="campo-aluno-linha"></div></div>
        <div class="campo-aluno"><span class="campo-aluno-label">Turma</span><div class="campo-aluno-linha"></div></div>
      </div>`;
  }

  const tituloHtml = `<div class="atividade-titulo-box"><div class="atividade-titulo">${data.titulo || 'Atividade'}</div></div>`;

  let exercHtml = '';
  (data.exercicios || []).forEach((ex, i) => {
    let respostaHtml = '';
    const tipo = (ex.tipo || '').toLowerCase().trim();

    switch(tipo) {

      case 'tracejado': {
        // Aceita "caracteres", "numeros", "letras" e faz fallback pelo enunciado
        let chars = ex.caracteres || ex.numeros || ex.letras || [];
        if (chars.length === 0) {
          const m = (ex.enunciado || '').match(/(\d)\s*[aà]\s*(\d)/);
          if (m) chars = Array.from({length: parseInt(m[2])-parseInt(m[1])+1}, (_,k) => String(parseInt(m[1])+k));
        }
        if (chars.length === 0) { respostaHtml = `<div class="caixa-resposta"></div>`; break; }
        const svgs = chars.map(c => `<div class="tracejado-char">${gerarSVGTracejado(String(c))}</div>`).join('');
        respostaHtml = `<div class="tracejado-container">${svgs}</div>`;
        break;
      }

      case 'figura': {
        const fig = (ex.imagem || 'estrela').toLowerCase();
        const qtd = Math.max(1, Math.min(5, parseInt(ex.quantidade) || 1));
        const svg = FIGURAS_SVG[fig] || FIGURAS_SVG['estrela'];
        respostaHtml = `<div class="figuras-container">${Array(qtd).fill(0).map(() =>
          `<div class="figura-item"><div class="figura-svg">${svg}</div></div>`).join('')}</div>`;
        break;
      }

      case 'contagem': {
        const grupos = ex.grupos || [];
        if (!grupos.length) { respostaHtml = `<div class="caixa-resposta"></div>`; break; }
        const gruposHtml = grupos.map(g => {
          const fig = (g.imagem || 'estrela').toLowerCase();
          const svg = FIGURAS_SVG[fig] || FIGURAS_SVG['estrela'];
          const qtd = Math.max(1, Math.min(6, parseInt(g.quantidade) || 1));
          const figs = Array(qtd).fill(0).map(() => `<div class="contagem-figura">${svg}</div>`).join('');
          return `<div class="contagem-grupo">
            <div class="contagem-figuras">${figs}</div>
            <div class="contagem-resposta-wrap">
              <div class="contagem-resposta"></div>
              <div class="contagem-resposta-label">Quantos?</div>
            </div>
          </div>`;
        }).join('');
        respostaHtml = `<div class="contagem-container">${gruposHtml}</div>`;
        break;
      }

      case 'cacapalavras': {
        const palavras = ex.palavras || [];
        if (!palavras.length) { respostaHtml = `<div class="caixa-resposta"></div>`; break; }
        respostaHtml = renderCacaPalavras(palavras);
        break;
      }

      case 'circule': {
        const opcoes = ex.opcoes || [];
        respostaHtml = `<div class="opcoes-circule">${opcoes.map(op => `<div class="opcao-item">${op}</div>`).join('')}</div>`;
        break;
      }

      case 'completar': {
        const itens = ex.itens || [];
        respostaHtml = `<div style="margin-top:8px">${itens.map(it =>
          `<div class="item-completar"><span class="item-completar-texto">${it}</span><div class="item-completar-linha"></div></div>`
        ).join('')}</div>`;
        break;
      }

      case 'escrever': {
        const n = ex.linhas || 2;
        respostaHtml = `<div style="margin-top:8px">${Array(n).fill(0).map(() => `<div class="${tipoLinha}"></div>`).join('')}</div>`;
        break;
      }

      case 'desenho':
        respostaHtml = `<div class="caixa-desenho">Desenhe aqui ✏️</div>`;
        break;

      case 'caixa':
        respostaHtml = `<div class="caixa-resposta"></div>`;
        break;

      default:
        console.warn('Tipo desconhecido:', tipo, ex);
        respostaHtml = `<div class="caixa-resposta" style="display:flex;align-items:center;justify-content:center;color:#DDD;font-size:0.75rem">${tipo || 'tipo desconhecido'}</div>`;
    }

    exercHtml += `
      <div class="exercicio">
        <div class="exercicio-header">
          <div class="exercicio-num">${i+1}</div>
          <div class="exercicio-enunciado">${ex.enunciado || ''}</div>
        </div>
        ${respostaHtml}
      </div>
      ${i < (data.exercicios.length - 1) ? '<hr class="separador">' : ''}`;
  });

  let desenhoLivreHtml = '';
  if (opts.espacoDesenho) {
    desenhoLivreHtml = `<div class="secao-desenho-livre"><div class="secao-desenho-titulo">✦ Desenhe o que você aprendeu hoje!</div><div class="caixa-desenho-livre">Espaço para desenho livre</div></div>`;
  }

  document.getElementById('folha-conteudo').innerHTML =
    cabHtml + tituloHtml + `<div>${exercHtml}</div>` + desenhoLivreHtml +
    `<div class="folha-rodape"><span>${nomeEscola}</span><span>${opts.turma} · ${hoje}</span></div>`;

  document.getElementById('tela-form').style.display = 'none';
  document.getElementById('tela-folha').style.display = 'block';
}

function voltarForm() {
  document.getElementById('tela-form').style.display = 'block';
  document.getElementById('tela-folha').style.display = 'none';
  document.getElementById('btn-gerar').disabled = false;
  document.getElementById('status').style.display = 'none';
}
</script>
